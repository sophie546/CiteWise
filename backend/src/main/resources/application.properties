spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
server.port=${SERVER_PORT:8081}
catalyst.base-url=${CATALYST_BASE_URL:https://catalyst-backend-d4eu.onrender.com/api}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
rrl.max-file-size-mb=20
 
n8n.webhook.url=${N8N_WEBHOOK_URL:https://citewise-n8n-1.onrender.com/webhook/semantic_scoring}
n8n.synthesis.webhook.url=${N8N_SYNTHESIS_WEBHOOK_URL:https://citewise-n8n-1.onrender.com/webhook/citewise-synthesizer-v2}
 
# Fix prepared statement error
spring.datasource.hikari.data-source-properties.prepareThreshold=0