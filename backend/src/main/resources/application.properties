spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
server.port=${SERVER_PORT:8081}
catalyst.base-url=${CATALYST_BASE_URL:https://catalyst-backend-d4eu.onrender.com/api}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB
rrl.max-file-size-mb=20
 
n8n.webhook.url=${N8N_WEBHOOK_URL:https://citewise-n8n-1.onrender.com/webhook/semantic_scoring}
n8n.synthesis.webhook.url=${N8N_SYNTHESIS_WEBHOOK_URL:https://citewise-n8n-1.onrender.com/webhook/citewise-synthesizer-v2}

# n8n scoring can take longer on cold starts or multi-file batches
n8n.connect-timeout-ms=${N8N_CONNECT_TIMEOUT_MS:5000}
n8n.read-timeout-ms=${N8N_READ_TIMEOUT_MS:120000}
n8n.retry.max-attempts=${N8N_RETRY_MAX_ATTEMPTS:2}
n8n.retry.backoff-ms=${N8N_RETRY_BACKOFF_MS:1500}

# Limit payload size sent to n8n scoring
citewise.scoring.max-chars-to-n8n=${CITEWISE_SCORING_MAX_CHARS_TO_N8N:9000}
citewise.scoring.max-chunks=${CITEWISE_SCORING_MAX_CHUNKS:6}
citewise.scoring.chunk-size=${CITEWISE_SCORING_CHUNK_SIZE:1000}
citewise.scoring.chunk-overlap=${CITEWISE_SCORING_CHUNK_OVERLAP:100}

# Citation metadata lookup for Module 3 synthesis references
citewise.metadata.arxiv-lookup-enabled=${CITEWISE_METADATA_ARXIV_LOOKUP_ENABLED:true}
citewise.metadata.doi-lookup-enabled=${CITEWISE_METADATA_DOI_LOOKUP_ENABLED:false}

# AI scoring executor sizing
citewise.scoring.executor.core-pool-size=${CITEWISE_SCORING_EXECUTOR_CORE_POOL_SIZE:2}
citewise.scoring.executor.max-pool-size=${CITEWISE_SCORING_EXECUTOR_MAX_POOL_SIZE:2}
citewise.scoring.executor.queue-capacity=100
 
# Fix prepared statement error
spring.datasource.hikari.data-source-properties.prepareThreshold=0
